<!DOCTYPE html>
<html>
<head>
    <title>Karar Asistanı</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="top-bar">
        <button onclick="toggleMode()" class="mode-btn">📱</button>
    </div>

    <h1>🤖 Karar Asistanı</h1>

    <form method="POST">
        <input type="text" name="soru" placeholder="Sorunu yaz..." required>
        <button type="submit">Sor</button>
    </form>

    {% if cevap %}
        <div class="sonuc">
            {{ cevap }}
        </div>
    {% endif %}

</div>

<script>
function toggleMode() {
    document.body.classList.toggle("mobile-mode");
}
</script>

</body>
</html>

    <button type="button" class="gecmis-btn">📜 Geçmiş</button>
</a>
