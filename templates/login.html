<!DOCTYPE html>
<html>
<head>
    <title>Giriş Yap</title>

    <!-- CSS BAĞLANTISI (EN ÖNEMLİ KISIM) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="login-card">

    <h1>🤖 Karar Asistanı</h1>

    <p>Hoş Geldin</p>

    {% if hata %}
        <div class="hata">{{ hata }}</div>
    {% endif %}

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="👤 Kullanıcı Adı">

        <input type="password"
               name="password"
               placeholder="🔒 Şifre">

        <button type="submit">
            Giriş Yap
        </button>

    </form>

</div>

</body>
</html>
